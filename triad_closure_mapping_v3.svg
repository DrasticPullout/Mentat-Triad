  <text x="140" y="138" text-anchor="middle" font-size="12" fill="rgb(93,202,165)">self-model updates</text>
  <text x="140" y="154" text-anchor="middle" font-size="12" fill="rgb(93,202,165)">(self perturbation)</text>
</g>

<!-- δf_env -->
<g>
  <rect x="40" y="174" width="200" height="68" rx="8" fill="rgb(113,43,19)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
  <text x="140" y="198" text-anchor="middle" font-size="14" font-weight="500" fill="rgb(245,196,179)">δf_env</text>
  <text x="140" y="218" text-anchor="middle" font-size="12" fill="rgb(240,153,123)">browser, LLMs, sensors</text>
  <text x="140" y="234" text-anchor="middle" font-size="12" fill="rgb(240,153,123)">(environment perturbation)</text>
</g>

<!-- δf_rel -->
<g>
  <rect x="40" y="254" width="200" height="68" rx="8" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
  <text x="140" y="278" text-anchor="middle" font-size="14" font-weight="500" fill="rgb(206,203,246)">δf_rel</text>
  <text x="140" y="298" text-anchor="middle" font-size="12" fill="rgb(175,169,236)">SMO loop residual</text>
  <text x="140" y="314" text-anchor="middle" font-size="12" fill="rgb(175,169,236)">(relation perturbation)</text>
</g>

<!-- arrows from sources into S -->
