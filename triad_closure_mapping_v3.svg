<line x1="40" y1="540" x2="780" y2="540" stroke="rgb(156,154,146)" stroke-width="0.5" opacity="0.3"/>
<text x="40" y="566" font-size="11" fill="rgb(156,154,146)">Core invariant (Math Spine §11)</text>
<g>
  <rect x="40" y="578" width="740" height="56" rx="8" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.5"/>
  <text x="410" y="600" text-anchor="middle" font-size="12" fill="rgb(211,209,199)">Loop is intelligent  ⇔   C_global &gt; 0   ∧   δ²Φ ≥ 0   ∧   T(x) preserved</text>
  <text x="410" y="618" text-anchor="middle" font-size="11" fill="rgb(194,192,182)">Triadic closure T(x) = relational consistency that f_rel maintains across state transitions.   Closure-holding limit: residual → 0, ẋ ∝ ∇Φ(x).</text>
</g>

