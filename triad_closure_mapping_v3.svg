<svg width="100%" viewBox="0 0 820 660" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif">
<title>Triadic closure through the DASS loop: operators, deltas, and f_rel as carried substance</title>
<desc>Three operator-deltas (delta f_self, delta f_env, delta f_rel) feed only into Sensing. Compression assembles the triadic closure operator f_rel = f_rel(f_self(x), f_env(x)). Prediction probes affordances structurally available given current f_rel and returns per-affordance closure residuals (predicted delta f_rel under each candidate). Coherence is a gate: when it fires it emits f_rel plus action; otherwise just f_rel. SMO computes the new delta f_rel and routes it back to Sensing, closing the loop. The substance flowing through I, P, A, SMO is f_rel; the perturbations are the deltas. Optionality is reachable state-space volume by construction, read externally as the P coordinate from Sigma_P; the loop does not consume it as a target.</desc>

<defs>
  <marker id="arr-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="rgb(156,154,146)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-rel" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="rgb(175,169,236)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ===== HEADER ===== -->
<text x="40" y="32" font-size="14" font-weight="500" fill="rgb(211,209,199)">Triadic closure through the DASS loop</text>
<text x="40" y="52" font-size="12" fill="rgb(194,192,182)">Operators map to closure: f_rel is the substance carried; δ-streams are the perturbations.   T(x) = f_rel( f_self(x), f_env(x) )</text>

<!-- ===== SECTION HEADERS ===== -->
<text x="40" y="84" font-size="11" fill="rgb(156,154,146)">Perturbation sources (operator deltas)</text>
<text x="380" y="84" text-anchor="middle" font-size="11" fill="rgb(156,154,146)">DASS loop (cognition)</text>
<text x="610" y="84" text-anchor="middle" font-size="11" fill="rgb(156,154,146)">Operator → closure mapping</text>

